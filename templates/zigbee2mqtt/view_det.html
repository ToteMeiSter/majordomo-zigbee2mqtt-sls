
<style>
/* компактная вёрстка страницы Детали (scoped на эту форму) */
form[name="frmEdit"] .form-group{margin-bottom:4px;}
form[name="frmEdit"] .control-label{font-size:12px;font-weight:600;color:#888;margin:0 0 1px;padding:0;display:block;text-align:left;}
form[name="frmEdit"] .form-control{height:28px;font-size:12px;padding:2px 8px;box-shadow:none;background:#fafafa;}
form[name="frmEdit"] .input-group{width:100%;}
form[name="frmEdit"] table{width:100%;}
form[name="frmEdit"] table td{display:block;width:100%!important;}
form[name="frmEdit"] img{max-width:120px;height:auto;}
/* фото устройства — не растягивать на десктопе, не вылезать на мобильном */
form[name="frmEdit"] td[valign="top"] img{max-width:100%;width:auto;}
form[name="frmEdit"] .input-group{max-width:100%;}
form[name="frmEdit"] .col-md-6{padding-left:0;padding-right:0;}
@media (max-width:768px){
  form[name="frmEdit"] .panel-body{padding:8px;}
}
</style>
<!-- Table 'mqtt' edit -->
<form action="?" method="post" enctype="multipart/form-data" name="frmEdit" class="form-horizontal">
<fieldset>

[#if CHANGEABLE<>""#]
<div class="panel panel-primary" style="margin-bottom:14px">
  <div class="panel-heading">Управление</div>
  <div class="panel-body">
    [#CONTROLHTML#]
    <div id="z2mdetresult" style="color:#888;font-size:12px;min-height:16px;margin-top:6px"></div>
  </div>
</div>
<script type="text/javascript">
function z2mdet(param, val) {
  var u = '<#ROOTHTML#>ajax/zigbee2mqtt.html?device=[#ID#]&command=' + encodeURIComponent(param) + '&value=' + val + '&friendlyname=[#IEEEADDR#]&gw=[#GW#]&settt=';
  var b = document.getElementById('z2mval_' + param);
  if (b && (val === 'ON' || val === 'OFF')) { b.textContent = val; b.className = 'label ' + (val === 'ON' ? 'label-success' : 'label-default'); }
  var r = document.getElementById('z2mdetresult'); if (r) r.innerHTML = '...';
  fetch(u, { credentials: 'same-origin' }).then(function(x){return x.text();}).then(function(){ if (r) r.innerHTML = 'команда отправлена'; }).catch(function(){ if (r) r.innerHTML = 'ошибка'; });
  return false;
}
</script>
[#endif#]
